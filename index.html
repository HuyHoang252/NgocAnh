<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ngọc Anh</title>

    <style>
         :root {
            /* Màu nền và màu chính */
            --nen-dam-1: midnightblue;
            --nen-dam-2: indigo;
            --hong-1: hotpink;
            --hong-2: lightpink;
            --hong-3: mistyrose;
            --xanh-la-1: limegreen;
            --xanh-la-2: seagreen;
        }
        
        * {
            box-sizing: border-box;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 30%), linear-gradient(180deg, indigo 0%, midnightblue 45%, black 100%);
            color: white;
        }
        
        #scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            isolation: isolate;
        }
        
        .stars,
        .falling-layer,
        .flowers {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            animation: twinkle var(--t, 3s) ease-in-out infinite;
            opacity: 0.35;
        }
        
        @keyframes twinkle {
            0%,
            100% {
                transform: scale(0.7);
                opacity: 0.2;
            }
            50% {
                transform: scale(1.8);
                opacity: 0.95;
            }
        }
        
        .ground-glow {
            position: absolute;
            left: 50%;
            bottom: -10vh;
            transform: translateX(-50%);
            width: 120vw;
            height: 42vh;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.16), rgba(255, 105, 180, 0.05) 35%, transparent 65%);
            filter: blur(18px);
            z-index: 0;
        }
        
        .title-wrap {
            position: absolute;
            top: 10vh;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 3;
            padding: 0 16px;
            width: 100%;
        }
        
        .title {
            font-size: clamp(24px, 5vw, 56px);
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0;
            color: white;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.9), 0 0 24px rgba(255, 182, 193, 0.7), 0 0 44px rgba(255, 105, 180, 0.45);
            animation: breathe 4.5s ease-in-out infinite;
            white-space: nowrap;
        }
        
        .subtitle {
            margin-top: 10px;
            font-size: clamp(14px, 2vw, 20px);
            color: rgba(255, 255, 255, 0.84);
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.25);
            letter-spacing: 1px;
            padding: 0 10px;
        }
        
        @keyframes breathe {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.035);
            }
        }
        
        .flower {
            position: absolute;
            bottom: -10vh;
            width: 320px;
            height: 760px;
            transform-origin: bottom center;
            filter: drop-shadow(0 0 22px rgba(255, 182, 193, 0.34));
        }
        
        .stem {
            position: absolute;
            left: 50%;
            bottom: 0;
            width: 10px;
            height: 360px;
            transform: translateX(-50%) scaleY(0);
            transform-origin: bottom center;
            background: linear-gradient(180deg, palegreen 0%, seagreen 100%);
            border-radius: 999px;
            box-shadow: 0 0 14px rgba(50, 205, 50, 0.25);
            animation: growStem 2.6s cubic-bezier(.22, .9, .3, 1) forwards;
        }
        
        .leaf {
            position: absolute;
            width: 82px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, palegreen 0%, limegreen 55%, seagreen 100%);
            border-radius: 0 100% 0 100%;
            opacity: 0;
            filter: drop-shadow(0 0 7px rgba(144, 238, 144, 0.22));
            animation: leafIn 1s ease forwards;
        }
        
        .leaf.left {
            left: 50%;
            bottom: 145px;
            transform: translateX(-100%) rotate(-30deg) scale(0.2);
            animation-delay: 1.1s;
        }
        
        .leaf.right {
            left: 50%;
            bottom: 215px;
            transform: translateX(6px) rotate(145deg) scale(0.2);
            animation-delay: 1.45s;
        }
        
        .branch {
            position: absolute;
            left: 50%;
            width: 7px;
            height: 95px;
            transform-origin: bottom center;
            background: linear-gradient(180deg, palegreen 0%, seagreen 100%);
            border-radius: 999px;
            box-shadow: 0 0 10px rgba(50, 205, 50, 0.18);
            opacity: 0;
            animation: branchGrow 1.2s ease forwards;
        }
        
        .branch.left2 {
            bottom: 105px;
            transform: translateX(-50%) rotate(-58deg) scaleY(0);
        }
        
        .branch.right2 {
            bottom: 125px;
            transform: translateX(-50%) rotate(56deg) scaleY(0);
        }
        
        .branch.left {
            bottom: 150px;
            transform: translateX(-50%) rotate(-38deg) scaleY(0);
        }
        
        .branch.right {
            bottom: 200px;
            transform: translateX(-50%) rotate(36deg) scaleY(0);
        }
        
        .branch.mid {
            bottom: 245px;
            transform: translateX(-50%) rotate(-10deg) scaleY(0);
        }
        
        .branch.top {
            bottom: 280px;
            height: 80px;
            transform: translateX(-50%) rotate(18deg) scaleY(0);
        }
        
        .branch-leaf {
            position: absolute;
            width: 34px;
            height: 18px;
            background: radial-gradient(circle at 30% 30%, palegreen 0%, limegreen 55%, seagreen 100%);
            border-radius: 0 100% 0 100%;
            top: 10px;
            right: -18px;
            transform: rotate(20deg);
        }
        
        .bloom {
            position: absolute;
            left: 50%;
            bottom: 300px;
            width: 220px;
            height: 220px;
            transform: translateX(-50%) scale(0.04);
            transform-origin: center center;
            animation: roseOpen 3.8s cubic-bezier(.2, .9, .2, 1) 1.2s forwards;
        }
        
        .petal {
            position: absolute;
            left: 50%;
            transform-origin: 50% 100%;
            opacity: 0;
            animation: petalBloom 2s ease forwards;
            box-shadow: inset 0 8px 14px rgba(255, 255, 255, 0.45), 0 0 16px rgba(255, 182, 193, 0.22);
        }
        
        .petal.outer {
            width: 78px;
            height: 130px;
            bottom: 10px;
            border-radius: 55% 55% 30% 30% / 70% 70% 30% 30%;
            background: linear-gradient(180deg, snow 0%, lightpink 20%, hotpink 62%, crimson 100%);
            z-index: 1;
        }
        
        .petal.inner {
            width: 62px;
            height: 105px;
            bottom: 34px;
            border-radius: 55% 55% 35% 35% / 72% 72% 28% 28%;
            background: linear-gradient(180deg, lavenderblush 0%, pink 24%, hotpink 65%, deeppink 100%);
            z-index: 3;
        }
        
        .rose-core {
            position: absolute;
            left: 50%;
            bottom: 72px;
            width: 42px;
            height: 68px;
            transform: translateX(-50%) scale(0.2);
            border-radius: 50% 50% 40% 40% / 45% 45% 55% 55%;
            background: linear-gradient(180deg, lavenderblush 0%, lightpink 40%, hotpink 100%);
            box-shadow: inset 0 6px 10px rgba(255, 255, 255, 0.55), 0 0 14px rgba(255, 105, 180, 0.35);
            z-index: 5;
            opacity: 0;
            animation: coreBloom 1.2s ease 3s forwards;
        }
        
        .rose-core::before,
        .rose-core::after {
            content: '';
            position: absolute;
            background: linear-gradient(180deg, pink 0%, lightpink 55%, deeppink 100%);
            border-radius: 50%;
        }
        
        .rose-core::before {
            width: 24px;
            height: 38px;
            left: 3px;
            top: 8px;
            transform: rotate(-18deg);
        }
        
        .rose-core::after {
            width: 24px;
            height: 38px;
            right: 3px;
            top: 8px;
            transform: rotate(18deg);
        }
        
        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 16px rgba(255, 255, 255, 0.95);
            animation: floatSpark linear infinite;
        }
        
        @keyframes growStem {
            0% {
                transform: translateX(-50%) scaleY(0);
            }
            100% {
                transform: translateX(-50%) scaleY(1);
            }
        }
        
        @keyframes branchGrow {
            0% {
                opacity: 0;
                transform-origin: bottom center;
            }
            100% {
                opacity: 1;
            }
        }
        
        @keyframes leafIn {
            to {
                opacity: 1;
            }
        }
        
        @keyframes roseOpen {
            0% {
                opacity: 0;
                transform: translateX(-50%) scale(0.04) rotate(-3deg);
            }
            45% {
                opacity: 1;
                transform: translateX(-50%) scale(0.62) rotate(0deg);
            }
            80% {
                opacity: 1;
                transform: translateX(-50%) scale(1.06) rotate(1deg);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) scale(1) rotate(0deg);
            }
        }
        
        @keyframes petalBloom {
            0% {
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            100% {
                opacity: 1;
            }
        }
        
        @keyframes coreBloom {
            0% {
                opacity: 0;
                transform: translateX(-50%) scale(0.2);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }
        }
        
        @keyframes sway {
            0%,
            100% {
                transform: rotate(-2deg);
            }
            50% {
                transform: rotate(2deg);
            }
        }
        
        @keyframes floatSpark {
            from {
                transform: translateY(0) scale(1);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            to {
                transform: translateY(-90px) scale(0.2);
                opacity: 0;
            }
        }
        
        .falling-text {
            position: absolute;
            top: -10vh;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 700;
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.9), 0 0 18px rgba(255, 182, 193, 0.55);
            animation-name: fallDown;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .falling-image {
            position: absolute;
            top: -18vh;
            width: 90px;
            height: 90px;
            border-radius: 18px;
            object-fit: cover;
            opacity: 0.95;
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.18);
            animation-name: fallDown;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
            -webkit-user-select: none;
            user-select: none;
        }
        
        @keyframes fallDown {
            0% {
                transform: translate3d(0, -10vh, 0) rotate(0deg);
                opacity: 0;
            }
            8% {
                opacity: 1;
            }
            100% {
                transform: translate3d(var(--drift, 0px), 120vh, 0) rotate(var(--rot, 180deg));
                opacity: 0;
            }
        }
        
        .bottom-note {
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.62);
            letter-spacing: 0.4px;
            z-index: 5;
            text-align: center;
            padding: 0 12px;
        }
        
        .controls {
            position: absolute;
            right: 14px;
            bottom: 14px;
            display: flex;
            gap: 10px;
            z-index: 10;
            pointer-events: auto;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        
        button {
            border: none;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
            transition: transform .2s ease, background .2s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.18);
        }
        
        @media (max-width: 640px) {
            .flower {
                transform: scale(0.9);
            }
            .title {
                font-size: 28px;
                white-space: nowrap;
            }
            .subtitle {
                font-size: 13px;
                padding: 0 14px;
            }
            .bottom-note {
                font-size: 12px;
            }
            .controls {
                right: 10px;
                bottom: 10px;
                gap: 8px;
            }
            button {
                padding: 9px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div id="scene">
        <div class="stars" id="stars"></div>
        <div class="ground-glow"></div>

        <div class="title-wrap">
            <h1 class="title">Gửi tới Ngọc Anh</h1>
            <div class="subtitle">Chúc Ngọc Anh luôn mạnh mẽ, tự tin và đạt được mọi điều mình mong muốn.</div>
        </div>

        <div class="flowers" id="flowers"></div>
        <div class="falling-layer" id="falling"></div>

        <div class="bottom-note">
            Vũ Thị Ngọc Anh
        </div>

        <div class="controls">
            <button id="toggleText">Tắt/Bật chữ rơi</button>
            <button id="toggleMusic">Bật/Tắt nhạc</button>
            <button id="replay">Chạy lại</button>
        </div>
    </div>

    <script>
        const CAU_HINH = {
            tieuDe: 'Gửi tới Ngọc Anh',
            phuDe: 'Chúc Ngọc Anh luôn mạnh mẽ, tự tin và đạt được mọi điều mình mong muốn.',
            chuRoi: ['Congratulations', 'Best Wishes', 'All the Best', 'Be Happy', 'With Love', 'Stay Blessed'],
            anhRoi: ['ngocanh.jpeg'],
            fileNhac: 'nhac.mp3',
            batChuRoi: true,
            batAnhRoi: true,
            tiLeHoa: 1.75,
            soLuongHoa: 1,
            soLuongSao: 50,
            tocDoRaChu: 500,
            tocDoRaAnh: 1200
        };

        const khungSao = document.getElementById('stars');
        const khungHoa = document.getElementById('flowers');
        const khungRoi = document.getElementById('falling');
        const nutBatTatChu = document.getElementById('toggleText');
        const nutChayLai = document.getElementById('replay');
        const nutNhac = document.getElementById('toggleMusic');
        const tieuDe = document.querySelector('.title');
        const phuDe = document.querySelector('.subtitle');

        let dangBatChuRoi = CAU_HINH.batChuRoi;
        let danhSachTimer = [];
        let dangPhatNhac = false;

        const nhacNen = new Audio(CAU_HINH.fileNhac);
        nhacNen.loop = true;
        nhacNen.volume = 0.7;
        nhacNen.preload = 'auto';

        tieuDe.textContent = CAU_HINH.tieuDe;
        phuDe.textContent = CAU_HINH.phuDe;

        function soNgauNhien(min, max) {
            return Math.random() * (max - min) + min;
        }

        function taoSao() {
            khungSao.innerHTML = '';
            for (let i = 0; i < CAU_HINH.soLuongSao; i++) {
                const sao = document.createElement('div');
                sao.className = 'star';
                sao.style.left = `${soNgauNhien(0, 100)}%`;
                sao.style.top = `${soNgauNhien(0, 100)}%`;
                sao.style.setProperty('--t', `${soNgauNhien(1.8, 4.8).toFixed(2)}s`);
                sao.style.opacity = soNgauNhien(0.15, 0.9).toFixed(2);
                khungSao.appendChild(sao);
            }
        }

        function taoHoa(viTriX, tiLe = 1, tre = 0) {
            const hoa = document.createElement('div');
            hoa.className = 'flower';
            hoa.style.left = `${viTriX}%`;
            hoa.style.animation = `sway ${soNgauNhien(3.5, 5.8).toFixed(2)}s ease-in-out ${tre}s infinite`;
            hoa.style.transform = `translateX(-50%) scale(${tiLe})`;

            const than = document.createElement('div');
            than.className = 'stem';
            than.style.animationDelay = `${tre}s`;

            const laTrai = document.createElement('div');
            laTrai.className = 'leaf left';
            laTrai.style.animationDelay = `${tre + 1.0}s`;

            const laPhai = document.createElement('div');
            laPhai.className = 'leaf right';
            laPhai.style.animationDelay = `${tre + 1.35}s`;

            const canhTrai2 = document.createElement('div');
            canhTrai2.className = 'branch left2';
            canhTrai2.style.animationDelay = `${tre + 1.0}s`;
            canhTrai2.innerHTML = `<div class="branch-leaf"></div>`;

            const canhPhai2 = document.createElement('div');
            canhPhai2.className = 'branch right2';
            canhPhai2.style.animationDelay = `${tre + 1.3}s`;
            canhPhai2.innerHTML = `<div class="branch-leaf"></div>`;

            const canhTrai = document.createElement('div');
            canhTrai.className = 'branch left';
            canhTrai.style.animationDelay = `${tre + 1.2}s`;
            canhTrai.innerHTML = `<div class="branch-leaf"></div>`;

            const canhPhai = document.createElement('div');
            canhPhai.className = 'branch right';
            canhPhai.style.animationDelay = `${tre + 1.5}s`;
            canhPhai.innerHTML = `<div class="branch-leaf"></div>`;

            const canhGiua = document.createElement('div');
            canhGiua.className = 'branch mid';
            canhGiua.style.animationDelay = `${tre + 1.8}s`;
            canhGiua.innerHTML = `<div class="branch-leaf"></div>`;

            const canhTren = document.createElement('div');
            canhTren.className = 'branch top';
            canhTren.style.animationDelay = `${tre + 2.0}s`;
            canhTren.innerHTML = `<div class="branch-leaf"></div>`;

            const noHoa = document.createElement('div');
            noHoa.className = 'bloom';
            noHoa.style.animationDelay = `${tre + 1.2}s`;

            const gocCanhNgoai = [-70, -40, -15, 0, 15, 40, 70];
            gocCanhNgoai.forEach((goc, i) => {
                const canh = document.createElement('div');
                canh.className = 'petal outer';
                canh.style.transform = `translateX(-50%) rotate(${goc}deg) scaleY(0.2)`;
                canh.style.animationDelay = `${tre + 1.5 + i * 0.08}s`;
                canh.dataset.openTransform = `translateX(-50%) rotate(${goc}deg) scaleY(1)`;
                noHoa.appendChild(canh);
            });

            const gocCanhTrong = [-35, -12, 12, 35];
            gocCanhTrong.forEach((goc, i) => {
                const canh = document.createElement('div');
                canh.className = 'petal inner';
                canh.style.transform = `translateX(-50%) rotate(${goc}deg) scaleY(0.2)`;
                canh.style.animationDelay = `${tre + 2.0 + i * 0.09}s`;
                canh.dataset.openTransform = `translateX(-50%) rotate(${goc}deg) scaleY(1)`;
                noHoa.appendChild(canh);
            });

            const nhuy = document.createElement('div');
            nhuy.className = 'rose-core';
            noHoa.appendChild(nhuy);

            requestAnimationFrame(() => {
                noHoa.querySelectorAll('.petal').forEach((canh) => {
                    canh.style.transform = canh.dataset.openTransform;
                });
            });

            for (let i = 0; i < 8; i++) {
                const hatSang = document.createElement('div');
                hatSang.className = 'spark';
                hatSang.style.left = `${50 + soNgauNhien(-12, 12)}%`;
                hatSang.style.bottom = `${410 + soNgauNhien(-10, 10)}px`;
                hatSang.style.animationDuration = `${soNgauNhien(1.8, 3.1).toFixed(2)}s`;
                hatSang.style.animationDelay = `${tre + soNgauNhien(1.6, 3.5).toFixed(2)}s`;
                hoa.appendChild(hatSang);
            }

            hoa.append(
                than,
                canhTrai2,
                canhPhai2,
                canhTrai,
                canhPhai,
                canhGiua,
                canhTren,
                laTrai,
                laPhai,
                noHoa
            );

            khungHoa.appendChild(hoa);
        }

        function hienThiHoa() {
            khungHoa.innerHTML = '';
            taoHoa(50, CAU_HINH.tiLeHoa, 0);
        }

        function taoChuRoi() {
            if (!dangBatChuRoi || !CAU_HINH.chuRoi.length) return;

            const chu = document.createElement('div');
            chu.className = 'falling-text';
            chu.textContent = CAU_HINH.chuRoi[Math.floor(Math.random() * CAU_HINH.chuRoi.length)];
            chu.style.left = `${soNgauNhien(2, 95)}%`;
            chu.style.fontSize = `${soNgauNhien(10, 20)}px`;
            chu.style.animationDuration = `${soNgauNhien(6.5, 11)}s`;
            chu.style.setProperty('--drift', `${soNgauNhien(-90, 90)}px`);
            chu.style.setProperty('--rot', `${soNgauNhien(-220, 220)}deg`);
            khungRoi.appendChild(chu);

            chu.addEventListener('animationend', () => chu.remove());
        }

        function taoAnhRoi() {
            if (!CAU_HINH.batAnhRoi || !CAU_HINH.anhRoi.length) return;

            const anh = document.createElement('img');
            anh.className = 'falling-image';
            anh.src = CAU_HINH.anhRoi[Math.floor(Math.random() * CAU_HINH.anhRoi.length)];
            anh.alt = 'anh-roi';
            anh.style.left = `${soNgauNhien(3, 93)}%`;
            anh.style.width = `${soNgauNhien(80, 120)}px`;
            anh.style.height = anh.style.width;
            anh.style.animationDuration = `${soNgauNhien(7, 12)}s`;
            anh.style.setProperty('--drift', `${soNgauNhien(-110, 110)}px`);
            anh.style.setProperty('--rot', `${soNgauNhien(-260, 260)}deg`);
            khungRoi.appendChild(anh);

            anh.addEventListener('animationend', () => anh.remove());
            anh.addEventListener('error', () => {
                console.warn('Không tìm thấy ảnh:', anh.src);
                anh.remove();
            });
        }

        function batVongLap() {
            tatVongLap();
            danhSachTimer.push(setInterval(taoChuRoi, CAU_HINH.tocDoRaChu));
            danhSachTimer.push(setInterval(taoAnhRoi, CAU_HINH.tocDoRaAnh));
        }

        function tatVongLap() {
            danhSachTimer.forEach(clearInterval);
            danhSachTimer = [];
        }

        async function batNhac() {
            try {
                await nhacNen.play();
                dangPhatNhac = true;
                nutNhac.textContent = 'Tắt nhạc';
            } catch (loi) {
                console.warn('Chưa phát được nhạc. Hãy chạm màn hình hoặc kiểm tra file nhạc.', loi);
            }
        }

        function tatNhac() {
            nhacNen.pause();
            dangPhatNhac = false;
            nutNhac.textContent = 'Bật nhạc';
        }

        function chayLai() {
            tatVongLap();
            khungRoi.innerHTML = '';
            hienThiHoa();
            setTimeout(batVongLap, 700);
        }

        nutBatTatChu.addEventListener('click', () => {
            dangBatChuRoi = !dangBatChuRoi;
            nutBatTatChu.textContent = dangBatChuRoi ? 'Tắt/Bật chữ rơi' : 'Bật lại chữ rơi';
        });

        nutChayLai.addEventListener('click', chayLai);

        nutNhac.addEventListener('click', async() => {
            if (dangPhatNhac) {
                tatNhac();
            } else {
                await batNhac();
            }
        });

        async function moKhoaNhacMotLan() {
            if (!dangPhatNhac) {
                await batNhac();
            }
            window.removeEventListener('pointerdown', moKhoaNhacMotLan);
            window.removeEventListener('touchstart', moKhoaNhacMotLan);
        }

        nhacNen.addEventListener('error', () => {
            console.warn('Không mở được file nhạc:', CAU_HINH.fileNhac);
        });

        taoSao();
        hienThiHoa();
        setTimeout(batVongLap, 700);

        window.addEventListener('pointerdown', moKhoaNhacMotLan, {
            once: true
        });
        window.addEventListener('touchstart', moKhoaNhacMotLan, {
            once: true
        });
        window.addEventListener('resize', taoSao);
    </script>
</body>


</html>
